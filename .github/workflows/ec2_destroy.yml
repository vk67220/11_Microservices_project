name: Terraform Destroy (Workspace)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: terraform_main_ec2

    env:
      ENV: ${{ github.event.inputs.environment }}

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Show Environment
      - name: Print Environment
        run: |
          echo "=================================="
          echo "Destroy Environment : $ENV"
          echo "=================================="

      # Terraform Version
      - name: Check Terraform Version
        run: terraform version

      # AWS CLI Version
      - name: Check AWS CLI Version
        run: aws --version

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Terraform Init
      - name: Terraform Init
        run: terraform init

      # Select Workspace
      - name: Select Workspace
        run: |
          terraform workspace select $ENV || terraform workspace new $ENV
          terraform workspace list

      # Terraform Format Check
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # Terraform Destroy Plan
      - name: Terraform Destroy Plan
        run: terraform plan -destroy -out=destroy.tfplan

      # Upload Destroy Plan (Optional)
      - name: Upload Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ env.ENV }}
          path: terraform_main_ec2/destroy.tfplan

      # Terraform Destroy
      - name: Terraform Destroy
        run: terraform apply -auto-approve destroy.tfplan

      # Completed
      - name: Destroy Completed
        run: |
          echo "=================================="
          echo "Terraform Destroy Completed"
          echo "Workspace : $ENV"
          echo "=================================="