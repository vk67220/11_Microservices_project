name: Build & Push Frontend

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker Image Tag"
        required: true
        default: "1"

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: frontend
  ECR_REGISTRY: 302524629943.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: frontend
  YAML_FILE: kubernetes-files/frontend.yaml

jobs:
  build-push:
    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Clean Docker
        run: |
          docker system prune -f
          docker container prune -f

      - name: Build Docker Image
        working-directory: src/frontend
        run: |
          docker build -t $IMAGE_NAME .

      - name: Tag Docker Image
        run: |
          docker tag $IMAGE_NAME:latest \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }}

      - name: Push Docker Image
        run: |
          docker push \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }}

      - name: Update Kubernetes Deployment YAML
        run: |
          sed -i "s#image:.*#image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }}#g" $YAML_FILE

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add $YAML_FILE

          git diff --cached --quiet || \
          git commit -m "Update frontend image to version ${{ github.event.inputs.image_tag }}"

      - name: Push Changes
        run: |
          git push origin HEAD:master