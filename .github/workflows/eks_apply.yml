name: Terraform Apply EKS

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Select Environment
        required: true
        type: choice
        options:
          - dev
          - production

permissions:
  id-token: write
  contents: read

jobs:

  terraform:

    runs-on: self-hosted

    environment: ${{ github.event.inputs.target_env }}

    defaults:
      run:
        working-directory: eks-terraform

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:

      #################################################
      # Checkout Repository
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Setup Terraform
      #################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      #################################################
      # Configure AWS Credentials (OIDC)
      #################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::302524629943:role/github-oidc-selfhosted-role
          aws-region: ${{ secrets.AWS_REGION }}

      #################################################
      # Verify AWS Identity
      #################################################

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      #################################################
      # Terraform Version
      #################################################

      - name: Terraform Version
        run: terraform version

      #################################################
      # Terraform Format
      #################################################

      - name: Terraform Format
        run: terraform fmt -check -recursive

      #################################################
      # Terraform Init
      #################################################

      - name: Terraform Init
        run: |
          terraform init \
            -reconfigure \
            -backend-config=backend/${{ github.event.inputs.target_env }}.hcl

      #################################################
      # Terraform Validate
      #################################################

      - name: Terraform Validate
        run: terraform validate

      #################################################
      # Terraform Plan
      #################################################

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/${{ github.event.inputs.target_env }}.tfvars \
            -out=tfplan

      #################################################
      # Terraform Apply
      #################################################

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      #################################################
      # Terraform Outputs
      #################################################

      - name: Terraform Outputs
        run: terraform output

      #################################################
      # Read Cluster Name
      #################################################

      - name: Read Cluster Name
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV

      #################################################
      # Update kubeconfig
      #################################################

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$CLUSTER_NAME"

      #################################################
      # Verify Nodes
      #################################################

      - name: Verify Nodes
        run: kubectl get nodes -o wide

      #################################################
      # Verify Cluster
      #################################################

      - name: Verify Cluster
        run: |
          aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --query "cluster.status"